# =============================================================
# DNS Control — nginx Reverse Proxy Configuration
# Production deployment on Debian 13 (Trixie)
#
# Install: cp dns-control.conf /etc/nginx/sites-available/dns-control
#          ln -s /etc/nginx/sites-available/dns-control /etc/nginx/sites-enabled/
#          nginx -t && systemctl reload nginx
# =============================================================

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name dns-control.example.com;

    # ACME challenge for Let's Encrypt / certbot
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — main server block
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name dns-control.example.com;

    # ---- TLS Certificates ----
    # Replace with your actual certificate paths.
    # For Let's Encrypt:
    #   sudo certbot certonly --webroot -w /var/www/certbot -d dns-control.example.com
    ssl_certificate     /etc/letsencrypt/live/dns-control.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dns-control.example.com/privkey.pem;

    # ---- TLS Settings ----
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;

    # OCSP Stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 127.0.0.1 valid=300s;
    resolver_timeout 5s;

    # ---- Security Headers ----
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'self';" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ---- Frontend — Static Build ----
    root /opt/dns-control/frontend/dist;
    index index.html;

    # SPA fallback: all non-API, non-file routes → index.html
    location / {
        try_files $uri $uri/ /index.html;

        # Cache static assets aggressively
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }
    }

    # ---- Backend API — Reverse Proxy ----
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;

        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts (apply operations can take time)
        proxy_connect_timeout 10s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;

        # Buffering
        proxy_buffering on;
        proxy_buffer_size 8k;
        proxy_buffers 8 8k;

        # No caching for API responses
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    # ---- Backend Docs (optional, disable in hardened production) ----
    location /docs {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /openapi.json {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
    }

    # ---- Logging ----
    access_log /var/log/nginx/dns-control-access.log;
    error_log  /var/log/nginx/dns-control-error.log warn;

    # ---- Limits ----
    client_max_body_size 10M;
}
